<section class="container py-5">

<div class="text-center mb-5">

<h1 class="display-4 fw-bold">

Contáctanos

</h1>

<p class="lead">

Estamos listos para ayudarte.

</p>

</div>

<div class="row g-5">

<div class="col-lg-5">

<div class="card shadow-lg border-0 p-4 h-100">

<h3 class="mb-4">

Información

</h3>

<p>

<i class="bi bi-geo-alt-fill"></i>

Bogotá D.C., Colombia

</p>

<p>

<i class="bi bi-telephone-fill"></i>

(+57) 601 555 5555

</p>

<p>

<i class="bi bi-envelope-fill"></i>

contacto@cobijitas.com

</p>

<p>

<i class="bi bi-clock-fill"></i>

Lunes a Sábado

8:00 a.m. - 6:00 p.m.

</p>

<hr>

<h5>

Síguenos

</h5>

<div class="fs-3">

<i class="bi bi-facebook me-3"></i>

<i class="bi bi-instagram me-3"></i>

<i class="bi bi-whatsapp"></i>

</div>

</div>

<h3 class="mb-4">

Envíanos un mensaje

</h3>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<input
type="text"
class="form-control form-control-lg"
placeholder="Nombre">

</div>

<div class="col-md-6 mb-3">

<input
type="email"
class="form-control form-control-lg"
placeholder="Correo">

</div>

</div>

<div class="mb-3">

<input
type="text"
class="form-control form-control-lg"
placeholder="Asunto">

</div>

<div class="mb-4">

<textarea
class="form-control"
rows="6"
placeholder="Escribe tu mensaje"></textarea>

</div>

<button
class="btn btn-dark btn-lg rounded-pill px-5">

Enviar mensaje

</button>

</form>

</div>

</div>

</div>
